<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<body>
    <section class="wrapper">
        <div class="container">
            <div class="col-sm-8 offset-sm-2 col-lg-6 offset-lg-3 col-xl-4 offset-xl-4 text-center">
                <div class="logo">
                    <br><img src="images/darwinbox" class="img-fluid" alt="logo">
                </div>
                <form class="rounded bg-white shadow p-3" action="/auth/signin" method="GET">
                    <h3 class="text-dark fw-bolder fs-4">Create an Account</h3>
                    <div class="fw-normal text-muted mb-3">
                        Already have an account? <button class="btn btn-primary">Sign In</button>
                    </div>
                </form>
                <form class="rounded bg-white shadow p-3"  method="POST" action="/auth/createNewUser">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control"  name ="name" id="floatingFirstName" placeholder="name" required>
                        <label for="floatingInput"><i class="fa fa-lock"></i>&nbsp; &nbsp;Name</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control"  name ="email" id="floatingInput" placeholder="name@example.com" required>
                        <label for="floatingInput"><i class="fa fa-lock"></i>&nbsp; &nbsp;Email address</label>
                    </div>
                    <div class="form-floating">
                        <input type="password" class="form-control" name="password" id="floatingPassword" placeholder="Password" required>
                        <label for="floatingPassword"><i class="fa fa-lock"></i>&nbsp; &nbsp;Password</label>
                        <span class="password-info mt-2">Use 8 or more characters with a mix of letters, numbers & symbols</span>
                    </div><br>
                    
                    <div class="form-check d-flex align-items-center">
                        <input class="form-check-input" type="checkbox" id="gridCheck" checked> 
                        <label class="form-check-label ms-2" for="gridCheck">I Agree   
                            <a href="#">Terms and Conditions</a>.
                        </label>
                    </div>
                      <button type="submit" class="btn btn-primary submit_btn w-100 my-4" >Sign Up</button>
                </form>
            </div>
        </div>
        
    </section>
</body>
</html>
