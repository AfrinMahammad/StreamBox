<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <section class="wrapper" style="padding-top: 150px; padding-bottom: 250px;">
        <div class="container">
            <div class="row justify-content-center" >
                <div class="col-lg-8">
                    <form class="rounded bg-white shadow p-5" action='/uploadvideo' method="post" width="100%" enctype="multipart/form-data">
                        <h3 class="text-dark fw-bolder fs-4 mb-2 text-center">Upload Video</h3>
                        <div class="mb-3">
                            <label for="title" class="form-label"><h6>Title</h6></label>
                            <input type="text" class="form-control" id="title" name="title">
                            <label for="desc" class="form-label"><h6>Description</h6></label>
                            <input type="text" class="form-control" id="desc" name="desc">
                            <label for="videoFile" class="form-label"><h6>Choose a video file</h6></label>
                            <input type="file" class="form-control" id="videoFile" name="videoFile" accept=".mp4">
                        </div>
                                <div class="main-title">
                                    <h6>Add Tags for the video</h6>
                                </div>
                                <div class="row category-checkbox">
                                  <!-- Checkbox columns -->
                                      <div class="custom-control custom-checkbox mb-3">
                                          <input type="checkbox" class="custom-control-input" id="customCheck1" name="tags" value="Product Trainings">
                                          <label class="custom-control-label" for="customCheck1" >Product Trainings</label>
                                      </div>
                                      <div class="custom-control custom-checkbox mb-3">
                                          <input type="checkbox" class="custom-control-input" id="customCheck2" name="tags" value="Process Trainings">
                                          <label class="custom-control-label" for="customCheck2">Process Trainings</label>
                                      </div>
                                      <div class="custom-control custom-checkbox mb-3">
                                        <input type="checkbox" class="custom-control-input" id="customCheck1" name="tags" value="HR Induction">
                                        <label class="custom-control-label" for="customCheck1" >HR Induction</label>
                                    </div>
                                    <div class="custom-control custom-checkbox mb-3">
                                        <input type="checkbox" class="custom-control-input" id="customCheck2" name="tags" value="Infosec & Compliance">
                                        <label class="custom-control-label" for="customCheck2" >Infosec & Compliance</label>
                                    </div>
                                    <div class="custom-control custom-checkbox mb-3">
                                      <input type="checkbox" class="custom-control-input" id="customCheck2" name="tags" value="Soft Skills">
                                      <label class="custom-control-label" for="customCheck2" >Soft Skills</label>
                                 </div>
                                 <div class="custom-control custom-checkbox mb-3">
                                  <input type="checkbox" class="custom-control-input" id="customCheck2" name="tags" value="Webinars">
                                  <label class="custom-control-label" for="customCheck2" >Webinars</label>
                             </div>
                             <div class="custom-control custom-checkbox mb-3">
                              <input type="checkbox" class="custom-control-input" id="customCheck2" name="tags" value="Events">
                              <label class="custom-control-label" for="customCheck2" >Events</label>
                         </div>
                             </div>
                            </div>
                        </div>
                     </div>
                        <button type="submit" class="btn btn-primary submit_btn w-100 mt-4">Upload</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
